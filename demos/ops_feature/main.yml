env: {}
start: 20241201
end: 20241203
refdata:

# checkpoint:
#   dir: checkpoint/
#   auto_save_interval: 1

worker:
  type: pool
  threads: 10

marketdata:
  - module: cs-snapshot
    symbols:
      - stocksv2.CHN
    config:
      skip_refdata_check: true
      fields:
        - bp
        - av
      levels: 5
    client:
      - signal
      - feature1
      - feature2
      - feature3
      - feature4
      - feature5

signal:
  name: signal
  module: wenjiapeng.ops_feature
  output:
    module: csv
    config:
      output_dir: output
  config:
    targets:
      - dynamic:stocksv2.CHN
    formula: "root = ts_min(@bp1,10) + ts_le_alpha(ts_max(@av1,20),@bp1,30)"

  factors:
    - name: feature1
      module: wenjiapeng.ops_feature
      output:
        module: csv
        config:
          output_dir: output
      config:
        targets:
          - dynamic:stocksv2.CHN
        formula: "root = ts_min(@bp1,10) + ts_le_alpha(ts_max(@av1,20),@bp1,30)"

    - name: feature2
