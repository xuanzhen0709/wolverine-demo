env: {}
start: "20240102"
end: "20240102"
calendar: /mnt/nas-3/ProcessedData/calendar/B3TradingDates.txt
refdata:
  ticker_mapping: HFT
marketdata:
  - module: tx-snapshot
    symbols: &id001
      - WIN.B3
    config:
      dataset: /mnt/nas-3/homes/jmhuang/data/ProcessedData/b3_tx/
    client:
      - fastcov
      - test1_B3WIN
      - WIN.S00802MBO
      - WIN.S00201MBO
      - WIN.t10v0k3
      - Y_skipm_tk2h90

worker:
  #type: hft
  type: sequential
  threads: 4

signal:
  name: fastcov
  module: yfchang.fastcov
  output:
    module: csv
    config:
      output_dir: output
  config:
    sampling: WIN.t10v0k3
    targets:
      - "@fastcov"
  factors:
    - name: test1_B3WIN
      module: yfchang.ImbSignal_MBO
      config:
        targets:
          - WIN.B3
        cfgstr: i2s1q2r0t50
        tfilter: ""
        inputs: *id001
    - name: WIN.S00802MBO
      module: hji.MBOPullSignal
      config:
        targets:
          - WIN.B3
        cfgstr: f0.75o0d0.25a0A0c1s5p0e0r0i5M10m0D0v-1.0V0.5w0l0S0P5n1N0Q0.9q-1u0T0.0L0
        tfilter: '{"09:01:00","18:29:00"}'
        inputs: *id001
    - name: WIN.S00201MBO
      module: hji.ShortTrdMBO
      config:
        targets:
          - WIN.B3
        cfgstr: f0.2i3c10p0.01L1
        tfilter: ""
        inputs: *id001
    - name: WIN.t10v0k3
      module: hji.DownSampler_tx
      # output:
      #   module: csv
      #   config:
      #     output_dir: output
      config:
        targets:
          - WIN.B3
        cfgstr: t10v0k3m1
        tfilter: ''
    - name: Y_skipm_tk2h90
      module: hji.Y_skip_midmv
      config:
        targets:
          - WIN.B3
        cfgstr: tk2h90
        tfilter: ""
    # - name: Y_skipm_tk2h90
    #   module: system.sigreader
    #   config:
    #     name: Y_skipm_tk2h90 # name of the signal that was saved
    #     format: csv
    #     dir: /mnt/nas-3/Shares/xxxx/
