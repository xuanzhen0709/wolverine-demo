env: {}
start: 20241215
end: 20241216
refdata:

checkpoint:
  dir: checkpoint/
  auto_save_interval: 1

marketdata:
  - module: cs-snapshot
    symbols:
      - stocksv2.CHN
    config:
      # data_dir: /global/wlsim/data/cs_snapshot
      skip_refdata_check: true
      fields:
        - bp
        - av
      levels: 5
    client:
      - csstock

signal:
  name: csstock
  module: wjp.csops
  output:
    module: csv
    config:
      output_dir: output
  config:
    targets:
      - dynamic:stocksv2.CHN
