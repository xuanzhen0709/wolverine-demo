env: {}

start: 20250703
end: 20250703

refdata: {}

worker:
  type: pool
  threads: 64

features:
  - name: ft1
    module: nickchenyj.ft1
    output:
      module: parquet
      config:
        output_dir: output
    config:
      provides:
        - order_cnt
        - order_pxmean
  - name: ft2
    module: nickchenyj.ft2
    output:
      module: csv
      config:
        output_dir: output
    config:
      provides:
        - trade_mean
        - trade_max
        - trade_min

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks.CHN
    config:
      levels: 10
      fields:
        - last_price
    features:
      - ft1
      - ft2
  - module: cs-mbo
    symbols:
      - stocks.CHN
    config:
    features:
      - ft1
      - ft2
