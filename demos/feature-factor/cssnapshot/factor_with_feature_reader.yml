env: {}

start: 20250703
end: 20250703

refdata: {}

worker:
  type: pool
  threads: 128

features:
  - name: ft1
    module: system.ftreader
    output:
      module: parquet
      config:
        output_dir: output
    config:
      format: parquet
      dir: output
      provides:
        - order_cnt
        - order_pxmean
  - name: ft2
    module: system.ftreader
    output:
      module: csv
      config:
        output_dir: output
    config:
      format: csv
      dir: output
      provides:
        - trade_mean
        - trade_max
        - trade_min

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks.CHN
    config:
      levels: 10
      fields:
        - last_price
    features:
      - ft1
      - ft2
    client:
      - test_ftreader
  - module: cs-mbo
    symbols:
      - stocks.CHN
    config:
    features:
      - ft1
      - ft2

signal:
  name: test_ftreader
  module: nickchenyj.feature_factor
  config:
    targets:
      - stocks.CHN
  output:
    module: csv
    config:
      output_dir: output
