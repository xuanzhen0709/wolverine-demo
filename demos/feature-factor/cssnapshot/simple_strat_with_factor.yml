env: {}
start: 20230703
end: 20230704
refdata: {}

worker:
  type: pool
  threads: 5

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks.CHN
    config:
      fields:
        - last_price
        - volume
        - ap
      levels: 5
    client:
      - strat
      - fct1
      - fct2
      - fct3
      - fct4
      - fct5
      - fct6
      - fct7
      - fct8
      - fct9

signal:
  name: strat
  module: nickchenyj.cssnap_simple_strat
  is_python: true
  output:
    module: csv
    config:
      output_dir: output
  factors:
    - name: fct1
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 1.234
      output:
        module: csv
        config:
          output_dir: output
    - name: fct2
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 2.345
      output:
        module: csv
        config:
          output_dir: output
    - name: fct3
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 3.456
      output:
        module: csv
        config:
          output_dir: output
    - name: fct4
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 4.567
      output:
        module: csv
        config:
          output_dir: output
    - name: fct5
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 5.678
      output:
        module: csv
        config:
          output_dir: output
    - name: fct6
      module: nickchenyj.cssnap_simple_factor
