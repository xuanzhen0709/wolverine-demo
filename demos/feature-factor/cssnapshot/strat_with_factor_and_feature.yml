env: {}

start: 20250703
end: 20250703

refdata: {}

worker:
  type: pool
  threads: 128

features:
  - name: ft1
    module: nickchenyj.ft1
    config:
      provides:
        - order_cnt
        - order_pxmean
  - name: ft2
    module: nickchenyj.ft2
    config:
      provides:
        - trade_mean
        - trade_max
        - trade_min

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks.CHN
    config:
      levels: 10
      fields:
        - last_price
    features:
      - ft1
      - ft2
    client:
      - strat
      - fct1
      - fct2
      - fct3
      - fct4
      - fct5
      - fct6
      - fct7
      - fct8
      - fct9
  - module: cs-mbo
    symbols:
      - stocks.CHN
    config:
    features:
      - ft1
      - ft2

signal:
  name: strat
  module: nickchenyj.cssnap_strat_with_feature
  is_python: true
  output:
    module: csv
    config:
      output_dir: output
  factors:
    - name: fct1
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 1.234
      output:
        module: csv
        config:
          output_dir: output
    - name: fct2
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 2.345
      output:
        module: csv
        config:
          output_dir: output
    - name: fct3
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 3.456
      output:
        module: csv
        config:
          output_dir: output
    - name: fct4
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 4.567
      output:
        module: csv
        config:
          output_dir: output
    - name: fct5
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 5.678
      output:
        module: csv
        config:
          output_dir: output
    - name: fct6
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 6.789
      output:
        module: csv
        config:
          output_dir: output
    - name: fct7
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 7.890
      output:
        module: csv
        config:
          output_dir: output
    - name: fct8
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 8.901
      output:
        module: csv
        config:
          output_dir: output
    - name: fct9
      module: nickchenyj.cssnap_simple_factor
      config:
        seed: 9.012
      output:
        module: csv
        config:
          output_dir: output

  config:
    targets:
      - stocks.CHN
    need_features:
      - trade_max
      - order_cnt