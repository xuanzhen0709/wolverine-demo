env: {}
start: 20230703
end: 20230704
refdata: {}

worker:
  type: sequential

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks.CHN
    config:
      fields:
        - last_price
        - volume
        - ap
      levels: 5
    client:
      - nested_strat
      - nested_strat1
      - nested_strat2
      - nested_fct1
      - nested_fct2
      - nested_fct3
      - nested_fct4
      - nested_fct5
      - nested_fct6
      - nested_fct1_2

signal:
  name: nested_strat
  module: nickchenyj.cssnap_simple_strat
  is_python: true
  output:
    module: csv
    config:
      output_dir: output
  config:
    targets:
      - stocks.CHN
  factors:
    - name: nested_strat1
      module: nickchenyj.cssnap_simple_strat
      is_python: true
      output:
        module: csv
        config:
          output_dir: output
      config:
        targets:
          - stocks.CHN
      factors:
        - name: nested_fct1
          module: nickchenyj.cssnap_simple_factor
          config:
            seed: 1.234
          output:
            module: csv
            config:
              output_dir: output
        - name: nested_fct2
          module: nickchenyj.cssnap_simple_factor
          config:
            seed: 2.345
          output:
            module: csv
            config:
              output_dir: output
        - name: nested_fct3
          module: nickchenyj.cssnap_simple_factor
          config:
            seed: 3.456
          output:
            module: csv
            config:
              output_dir: output
    - name: nested_strat2
      module: nickchenyj.cssnap_simple_strat
      is_python: true
      output:
        module: csv
        config:
          output_dir: output
      config:
        targets:
          - stocks.CHN
      factors:
        - name: nested_fct4
          module: nickchenyj.cssnap_simple_factor
          config:
            seed: 4.567
          output:
            module: csv
            config:
              output_dir: output
        - name: nested_fct5
          module: nickchenyj.cssnap_simple_factor
          config:
            seed: 5.678
          output:
            module: csv
            config:
              output_dir: output
        - name: nested_fct6
          module: nickchenyj.cssnap_simple_factor
          config:
            seed: 6.789
          output:
            module: csv
            config:
              output_dir: output
        - name: nested_fct1_2
          module: nickchenyj.cssnap_simple_factor
          config:
            seed: 1.234
          output:
            module: csv
            config:
              output_dir: output
