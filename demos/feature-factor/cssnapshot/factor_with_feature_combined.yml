env: {}

start: 20250703
end: 20250703

refdata: {}

worker:
  type: pool
  threads: 128

features:
  - name: ft1
    module: nickchenyj.ft1
    config:
      provides:
        - order_cnt
        - order_pxmean
  - name: ft2
    module: nickchenyj.ft2
    config:
      provides:
        - trade_mean
        - trade_max
        - trade_min

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks.CHN
    config:
      levels: 10
      fields:
        - last_price
    features:
      - ft1
      - ft2
    client:
      - test
  - module: cs-mbo
    symbols:
      - stocks.CHN
    config:
    features:
      - ft1
      - ft2

signal:
  name: test
  module: nickchenyj.feature_factor
  config:
    targets:
      - stocks.CHN
  output:
    module: csv
    config:
      output_dir: output
