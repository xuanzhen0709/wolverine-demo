env: {}

start: 20230103
end: 20230104

refdata: {}

checkpoint:
  dir: checkpoint
  save:
    - 20230103

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks.CHN
    config:
      fields:
        - last_price
        - volume
    client:
      - checkpoint_save

signal:
  name: checkpoint_save
  module: nickchenyj.checkpoint
  is_python: true
  output:
    module: csv
    config:
      output_dir: output
  config:
    targets:
      - dynamic:stocks.CHN
