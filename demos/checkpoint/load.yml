env: {}
start: 20230104
end: 20230104

refdata: {}

checkpoint:
  dir: checkpoint
  auto_load: yesterday

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks.CHN
    config:
      fields:
        - ap
        - last_price
        - volume
      levels: 1
    client:
      - checkpoint_load

signal:
  name: checkpoint_load
  module: nickchenyj.checkpoint
  output:
    module: csv
    config:
      output_dir: output
  config:
    targets:
      - dynamic:stocks.CHN
