env: {}
start: 20230103
end: 20230104

refdata:

checkpoint:
  dir: checkpoint
  load: 20230103
  save:
    - 20230104

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks
    config:
      fields:
        - ap
        - last_price
        - volume
      levels: 1
      client:
        - checkpoint

signal:
  name: checkpoint
  module: nickchenyj.checkpoint
  # output:
  #   module: csv
  #   config:
  #     output_dir: output
  config:
    targets:
      - dynamic:stocks
    freq: 120
