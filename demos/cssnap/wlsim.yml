env: {}
start: 20230103
end: 20230104
refdata: {}

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks.CHN
    config:
      # data_dir: /global/wlsim/data/cs_snapshot
      fields:
        - last_price
        - volume
        - ap
      levels: 1
    client:
      - cssnap

signal:
  name: cssnap
  module: nickchenyj.cssnap
  output:
    module: csv
    config:
      output_dir: output
  config:
    targets:
      - dynamic:stocks.CHN
