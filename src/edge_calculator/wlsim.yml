env:
  python_runtime: libpython3.8.so

start: 20230101
end: 20230109
refdata:

marketdata:
  - module: snapshot
    symbols:
      - IC.CFFEX
    config:
      fields:
        - ap
        - bp
      levels: 1
    client:
      - edge

signal:
  name: edge
  module: nickchenyj.edge_calculator
  is_python: true
  config:
    targets:
      - IC.CFFEX
    signame: snapshot-py
    sigdir: output
    file_type: npy
    output_dir: output/edge/
    # (0,1], default: 0.1
    quantile: 0.1
    # support m/s/h.
    futret_bias_start: 0s
    # support m/s/h.
    futret_bias_end: 1h
    # support m/s/h.
    futret_bias_step: 1m
