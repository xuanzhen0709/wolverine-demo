env:
start: 20220118
end: 20220223
refdata:

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks
    config:
      fields:
        - last_price
        # midpx
        - ap
        - bp
        # vwap
        - turnover
        - volume
      levels: 1
    client:
      - cs_pnl

signal:
  name: cs_pnl
  module: nickchenyj.cs_pnl_calculator
  is_python: true
  config:
    targets:
      - dynamic:stocks
    # user defined params can go below
    # support continuous/daily
    mode: daily
    signame: csstock-py
    sigdir: output/csstock-py
    file_type: csv
    output_dir: output/cs_pnl/
    # support mid(mid=(ap+bp)/2),vwap, close
    exec_price:
      - mid
      - vwap_5m
      - vwap_10m
      - close
      - close_3s
