calendar: scripts/ChinaTradingDates.txt
start: 20230103
end: 20230104

refdata:
  config:
    # data_dir: /global/wlsim/data/refdata

checkpoint:
  dir: checkpoint
  load_date: 20230103
  save_dates:
    - 20230104

signal:
  name: checkpoint
  module: nickchenyj.checkpoint
  output:
    module: csv
    config:
      output_dir: output
  config:
    targets:
      - dynamic:stocks
    marketdata:
      - module: cs-snapshot
        symbols:
          - stocks
        config:
          # data_dir: /global/wlsim/data/cs_snapshot
          fields:
            - ap
            - last_price
            - volume
          levels: 1
    freq: 120