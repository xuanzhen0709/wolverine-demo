calendar: scripts/ChinaTradingDates.txt
start: 20230101
end: 20230104

refdata:
  config:
    # data_dir: /global/wlsim/data/refdata

checkpoint:
  dir: checkpoint
  load_date: 20230103
  save_dates:
    - 20230104

signal:
  name: checkpoint-py
  module: py
  output:
    module: csv
    config:
      output_dir: output
  config:
    module: nickchenyj.checkpoint
    pylib: libpython3.8.so
    config:
      targets:
        - dynamic:stocks
      marketdata:
        - module: cs-snapshot
          symbols:
            - stocks
          config:
            # data_dir: /global/wlsim/data/cs_snapshot
            fields:
              - last_price
              - volume
      # user defined params can go below