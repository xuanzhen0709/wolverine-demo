env:
  python_runtime: libpython3.8.so
start: 20230103
end: 20230104
refdata:

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks
    config:
      fields:
        - ap
        - bp
      levels: 1
    client:
      - edge

signal:
  name: cs_edge
  module: nickchenyj.cs_edge_calculator
  is_python: true
  config:
    targets:
      - dynamic:stocks
    signame: csstock-py
    sigdir: output
    file_type: npy
    output_dir: output/cs_edge/
    # (0,1], default: 0.1
    quantile: 0.1
    # support m/s/h.
    futret_bias_start: 0s
    # support m/s/h.
    futret_bias_end: 1h
    # support m/s/h.
    futret_bias_step: 1m
