            # data_dir: /mnt/nas-3/ProcessedData/stock_snapshot_bin/binary_tick/
            fields:
              - last_price
              - volume
              - ap
            levels: 1
        - module: cs-mbo
          symbols:
            - stocks
          config:
            # data_dir: /mnt/nas-3/ProcessedData/tick_slice_3s_bin/
