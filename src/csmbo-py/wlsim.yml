env:
start: 20231110
end: 20231110
refdata:

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks
    config:
      fields:
        - last_price
        - volume
        - ap
      levels: 1
    client:
      - csmbo-py
  - module: cs-mbo
    symbols:
      - stocks
    config:
    client:
      - csmbo-py

signal:
  name: csmbo-py
  module: nickchenyj.csmbo
  is_python: true
  output:
    module: csv
    config:
      output_dir: output
  config:
    targets:
      - dynamic:stocks
