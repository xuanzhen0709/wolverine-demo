env:
  python_runtime: libpython3.8.so
start: 20230701
end: 20230709

refdata:
  # data_dir: /global/wlsim/data/refdata

signal:
  name: ic
  module: py
  config:
    module: nickchenyj.cs_ic_calculator
    config:
      targets:
        - dynamic:stocks

      marketdata:
        - module: cs-snapshot
          symbols:
            - stocks
          config:
            fields:
              - ap
              - bp
            levels: 1
      signame: csstock-py
      sigdir: output
      file_type: csv
      output_dir: output/cs_ic/
      # support m/s/h
      futret_bias: 5m
      # Optional, support m/s/h
      ffill_interval: 1s
