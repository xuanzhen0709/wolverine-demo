env:
start: 20230101
end: 20230109
refdata:

marketdata:
  # if map with fut
  - module: snapshot
    symbols:
      - IC.CFFEX
    config:
      fields:
        - ap
        - bp
      levels: 1
    client:
      - ic
  #   # if map with stock
  # - module: cs-snapshot
  #   symbols:
  #     - stocks
  #   config:
  #     fields:
  #     - ap
  #     - bp
  #     levels: 1
  #   client:
  #     - ic

signal:
  name: ic
  module: nickchenyj.ic_calculator
  is_python: true
  config:
    # if map with fut
    targets:
      - IC.CFFEX
    # if map with stock
    # targets:
    #   - dynamic:stocks
    # user defined params can go below
    # support continuous/daily
    mode: continuous
    signame: snapshot-py
    sigdir: output
    file_type: npy
    output_dir: output/ic/
    # support m/s/h
    # In the current mode, small futret_bias are supported
    # futret_bias do not exceed the minimum trading period length
    futret_bias:
      - 5m
    # optional
    # stock_map: /home/qsun/wolverine-demo/src/ic_calculator/maplist.xlsx
