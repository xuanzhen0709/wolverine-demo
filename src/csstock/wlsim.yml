calendar: /mnt/nas-3/CTA/Data/ChinaTradingDates.txt
start: 20230103
end: 20230104

refdata:
  config:
    # data_dir: /global/wlsim/data/refdata

signal:
  name: csstock
  module: nickchenyj.csstock
  output:
    module: csv
    config:
      output_dir: output
  config:
    targets:
      - dynamic:stocks
    marketdata:
      - module: cs-snapshot
        symbols:
          - stocks
        config:
          # data_dir: /global/wlsim/data/cs_snapshot
          fields:
            - last_price
            - volume
            - ap
          levels: 1
    # freq can be 60/120/180
    freq: 120
