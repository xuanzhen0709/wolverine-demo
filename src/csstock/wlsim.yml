env:
start: 20230103
end: 20230104
refdata:

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks
    config:
      # data_dir: /global/wlsim/data/cs_snapshot
      fields:
        - last_price
        - volume
        - ap
      levels: 1
    client:
      - csstock

signal:
  name: csstock
  module: nickchenyj.csstock
  output:
    module: csv
    config:
      output_dir: output
  config:
    targets:
      - dynamic:stocks
