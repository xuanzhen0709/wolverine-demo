env: {}

start: 20220118
end: 20220223
refdata:

marketdata:
  - module: snapshot
    symbols:
      - au.SHFE
    config: {}        
    client:
      - pnl
signal:
  name: pnl
  module: nickchenyj.pnl_calculator
  is_python: true
  config:
    targets:
      - au.SHFE
    mode: daily
    signame: bar-py
    sigdir:  output/bar-py/au.SHFE
    file_type: csv
    output_dir: output/pnl/
    # support mid(mid=(ap+bp)/2),vwap, close
    exec_price:
      - mid
      - vwap_5m
      - vwap_10m
      - close
      - close_3s
    # user defined params can go below
    # support continuous/daily