env: {}

start: 20220118
end: 20220223

refdata:

marketdata:
  - module: cs-snapshot
    symbols:
      - stocks
    config:
      fields:
        - last_price
        # midpx
        - ap
        - bp
        # vwap
        - turnover
        - volume
      levels: 1
    client:
      - pnl

signal:
  name: pnl
  module: nickchenyj.pnl_calculator
  is_python: true
  config:
    targets:
      - dynamic:stocks
      # user defined params can go below
      # support continuous/daily
    mode: daily
    signame: bar-py
    sigdir: output/bar-py/au.SHFE
    file_type: csv
    output_dir: output/pnl/
    stock_map: src/pnl_calculator/maplist.xlsx
    # support mid(mid=(ap+bp)/2),vwap, close
    exec_price:
      - mid
      - vwap_5m
      - vwap_10m
      - close
      - close_3s
