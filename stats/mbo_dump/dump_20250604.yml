env: {
  nas_dir: /mnt/nas-intern
}
# 有代表性的 2025 普通交易日（年中周三），跨两所四板块各挑一只流动性代表股。
start: 20250604
end: 20250604
refdata: {}

marketdata:
  - module: cs-mbo
    symbols:
      - stocks.CHN
    config:
    client:
      - mbo_dump

signal:
  name: mbo_dump
  module: stats.mbo_dump
  output:
    module: csv
    config:
      output_dir: output/_unused
  config:
    targets:
      - dynamic:stocks.CHN
    output_dir: output/mbo_dump
    # 跨 SSE(600/601/688) 与 SZSE(000/300) 各板块代表股。
    symbols:
      - 600000.SH   # SSE 主板  浦发银行
      - 601398.SH   # SSE 主板  工商银行
      - 688981.SH   # SSE 科创板 中芯国际
      - 000001.SZ   # SZSE 主板  平安银行
      - 300750.SZ   # SZSE 创业板 宁德时代
    human_time: true
